<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movilnet - Registro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        movilnet: {
                            orange: '#FF6600',
                            dark: '#1e1e1e',
                            gray: '#f4f4f6',
                            textDark: '#2d2d2d'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-movilnet-gray text-movilnet-textDark min-h-screen flex flex-col font-sans antialiased flex flex-col font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-md flex justify-between items-center px-6 md:px-12 py-4 sticky top-0 z-50">
        <!-- Logo simulado (Movilnet suele ir en minúsculas) -->
        <div class="text-3xl font-extrabold text-[#00A3E0] tracking-tighter">
           <a href="index.html">
            <img src="./assets/descarga (18).jfif" alt="logo movilnet" class="h-20 w-auto">
            </a>
        </div>
        
        <!-- Enlace de navegación solicitado -->
        <div>
            <a href="index.html" class="text-xl md:text-base font-semibold text-[#005A9C] border-b-2 border-[#FF671F] pb-1 hover:text-[#00A3E0] transition-colors">
                Ingresar
            </a>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main class="flex-1 flex items-center justify-center px-4 py-10">
        
        <!-- Tarjeta del Formulario -->
        <div class="bg-white w-full max-w-md p-8 md:p-10 rounded-lg shadow-sm border-t-4 border-[#00A3E0]">
            <h2 class="text-2xl font-bold text-[#005A9C] text-center mb-2">
                Crea tu cuenta
            </h2>
            <p class="text-sm text-gray-500 text-center mb-8">
                Ingresa tus datos para registrarte en la plataforma
            </p>
            
            <!-- Formulario -->
            <form  class="space-y-5">
                
                <!-- Nombre -->
                <div>
                    <label for="nombre_usuario" class="block text-sm font-semibold text-gray-700 mb-2">
                        Nombre de Usuario 
                    </label>
                    <input type="text" id="nombre_usuario" name="nombre_usuario" placeholder="Ej. JuanPerez" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm outline-none focus:border-[#00A3E0] focus:ring-1 focus:ring-[#00A3E0] transition-all">
                </div>

                <!-- Campo: Apellido -->
                <div>
                    <label for="apellido" class="block text-sm font-semibold text-gray-700 mb-2">
                        Apellido
                    </label>
                    <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm outline-none focus:border-[#00A3E0] focus:ring-1 focus:ring-[#00A3E0] transition-all">
                </div>

                <!-- Campo: Correo -->
                <div>
                    <label for="correo" class="block text-sm font-semibold text-gray-700 mb-2">
                        Correo Electrónico
                    </label>
                    <input type="tel" id="correo" name="correo" placeholder="Ej. correo@ejemplo.com" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm outline-none focus:border-[#00A3E0] focus:ring-1 focus:ring-[#00A3E0] transition-all">
                </div>

                <!-- Campo: Contraseña -->
                <div>
                    <label for="contraseña" class="block text-sm font-semibold text-gray-700 mb-2">
                        Contraseña
                    </label>
                    <input type="password" id="contraseña" name="contraseña" placeholder="Ingresa tu contraseña" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm outline-none focus:border-[#00A3E0] focus:ring-1 focus:ring-[#00A3E0] transition-all">
                </div>

                <!-- Campo: Rol-->
                <div>
                    <label for="rol" class="block text-sm font-semibold text-gray-700 mb-2">
                        Rol
                    </label>
                    <select id="rol" name="rol" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md text-sm outline-none focus:border-[#00A3E0] focus:ring-1 focus:ring-[#00A3E0] transition-all">
                        <option value="" disabled selected>Selecciona un rol</option>
                        <option value="usuario">Usuario</option>
                        
                    </select>
                </div>

                <!-- Botón de Envío --> 
                 
                <button  
                
                        class="w-full bg-[#FF671F] hover:bg-[#e05310] text-white font-bold py-3 px-4 rounded-md text-base shadow-md hover:shadow-lg transition-all active:scale-[0.99] mt-2 cursor-pointer">
                    <a href="index.html">    
                        Registrarse
                   </a>     
                </button>
                
            </form>
        </div>
        
    </main>

</body>
</html>
