<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movilnet - Registro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#F4F7F9] text-gray-800 min-h-screen flex flex-col font-sans">
   <!-- Navbar -->
    <nav class="bg-white shadow-md flex justify-between items-center px-6 md:px-12 py-4 sticky top-0 z-50">
        <!-- Logo simulado (Movilnet suele ir en minúsculas) -->
        <div class="text-3xl font-extrabold text-[#00A3E0] tracking-tighter">
           <img src="./assets/descarga (18).jfif" alt="logo movilnet" class="h-20 w-auto">
        </div>
        
        <!-- Enlace de navegación solicitado -->
        <div class="flex items-center space-x-4">
            <a href="registro.html" class="text-xl md:text-base font-semibold text-[#005A9C] border-b-2 border-[#FF671F] pb-1 hover:text-[#00A3E0] transition-colors">
                Registrarme
            </a>
            <a href="reportes_carga.html" class="text-xl md:text-base font-semibold text-[#005A9C] border-b-2 border-[#FF671F] pb-1 hover:text-[#00A3E0] transition-colors">
                Carga de Reportes
            </a>
              <a href="dashboard.html" class="text-xl md:text-base font-semibold text-[#005A9C] border-b-2 border-[#FF671F] pb-1 hover:text-[#00A3E0] transition-colors">
                Dashboard
            </a>
        </div>
    </nav>

     <!-- Campo: Correo -->
    <div class="mt-30 mb-4 flex flex-col items-center justify-center">
        <label for="correo" class="block text-sm font-bold text-black-700 mb-2">
            Correo Electrónico
        </label>
        <input type="tel" id="correo" name="correo" placeholder="Ej. correo@ejemplo.com" required
            class="w-full max-w-md px-4 py-3 border border-gray-300 rounded-md text-sm outline-none focus:border-[#00A3E0] focus:ring-1 focus:ring-[#00A3E0] transition-all">
    </div>

    <!-- Campo: Contraseña -->
    <div class="mb-4 flex flex-col items-center justify-center">
        <label for="contraseña" class="block text-sm font-bold text-black-700 mb-2">
            Contraseña
        </label>
        <input type="password" id="contraseña" name="contraseña" placeholder="Ingresa tu contraseña" required
            class="w-full max-w-md px-4 py-3 border border-gray-300 rounded-md text-sm outline-none focus:border-[#00A3E0] focus:ring-1 focus:ring-[#00A3E0] transition-all">
   
     
        <button class="w-full mt-20 max-w-md bg-[#FF671F] hover:bg-[#e05310] text-white font-bold py-3 px-4 rounded-md text-base shadow-md hover:shadow-lg transition-all active:scale-[0.99] mt-2 cursor-pointer">
           <a href="reportes_carga.html"  > 
            Iniciar Sesión
            </a> 
        </button>
     
    </div>
</body>
</html>
